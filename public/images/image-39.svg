<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="480" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D0060"/><stop offset="100%" stop-color="#6A1B9A"/>
    </linearGradient>
    <clipPath id="fr"><rect width="680" height="480"/></clipPath>
  </defs>
  <g clip-path="url(#fr)">
    <!-- ── TOP ILLUSTRATION ZONE (y 0–200) ── -->
    <rect width="680" height="200" fill="url(#bg)"/>
    <rect width="680" height="200" fill="rgba(0,0,0,0.18)"/>
    <!-- Big icon centred vertically in top zone -->
    <text x="340" y="138" text-anchor="middle" font-family="Arial,sans-serif"
          font-size="104" fill="rgba(255,255,255,0.88)">&#9878;</text>

    <!-- ── BOTTOM TEXT ZONE (y 200–480, white) ── -->
    <rect y="200" width="680" height="280" fill="white"/>

    <!-- Source band -->
    <rect y="200" width="680" height="34" fill="#4A148C"/>
    <text x="16" y="223" font-family="Arial,sans-serif" font-size="16"
          font-weight="bold" fill="white">Secretaria dos Direitos Humanos</text>
    <text x="664" y="223" text-anchor="end" font-family="Arial,sans-serif"
          font-size="13" fill="rgba(255,255,255,0.82)">01/10/2025</text>

    <!-- Badge -->
    <rect x="16" y="248" width="124" height="24" rx="12" fill="#4A148C"/>
    <text x="26" y="264" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">SEUS DIREITOS</text>

    <!-- Headline (large, dark) -->
    <text x="16" y="295" font-family="Arial,sans-serif"
             font-size="30" font-weight="900" fill="#111">Estatuto do Idoso garante</text>
    <text x="16" y="329" font-family="Arial,sans-serif"
             font-size="30" font-weight="900" fill="#111">transporte e atendimento</text>
    <text x="16" y="363" font-family="Arial,sans-serif"
             font-size="30" font-weight="900" fill="#111">prioritario</text>

    <!-- Excerpt (smaller, grey) -->
    <text x="16" y="407" font-family="Arial,sans-serif"
             font-size="17" fill="#444">Lei 10.741 completa 22 anos garantindo direitos a</text>
    <text x="16" y="429" font-family="Arial,sans-serif"
             font-size="17" fill="#444">maiores de 60.</text>

    <!-- Accent bands -->
    <rect width="680" height="9" fill="#1565C0"/>
    
  </g>
</svg>