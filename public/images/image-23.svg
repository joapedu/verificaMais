<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="480" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3D0000"/><stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <clipPath id="fr"><rect width="680" height="480"/></clipPath>
  </defs>
  <g clip-path="url(#fr)">
    <!-- ── TOP ILLUSTRATION ZONE (y 0–200) ── -->
    <rect width="680" height="200" fill="url(#bg)"/>
    <rect width="680" height="200" fill="rgba(0,0,0,0.18)"/>
    <!-- Big icon centred vertically in top zone -->
    <text x="340" y="138" text-anchor="middle" font-family="Arial,sans-serif"
          font-size="104" fill="rgba(255,255,255,0.88)">&#128737;</text>

    <!-- ── BOTTOM TEXT ZONE (y 200–480, white) ── -->
    <rect y="200" width="680" height="280" fill="white"/>

    <!-- Source band -->
    <rect y="200" width="680" height="34" fill="#B71C1C"/>
    <text x="16" y="223" font-family="Arial,sans-serif" font-size="16"
          font-weight="bold" fill="white">AlertaViral24h.com</text>
    <text x="664" y="223" text-anchor="end" font-family="Arial,sans-serif"
          font-size="13" fill="rgba(255,255,255,0.82)">URGENTE - agora</text>

    <!-- Badge -->
    <rect x="16" y="248" width="76" height="24" rx="12" fill="#FF1744"/>
    <text x="26" y="264" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">URGENTE</text>

    <!-- Headline (large, dark) -->
    <text x="16" y="295" font-family="Arial,sans-serif"
             font-size="30" font-weight="900" fill="#111">NOVO VIRUS mais mortal que</text>
    <text x="16" y="329" font-family="Arial,sans-serif"
             font-size="30" font-weight="900" fill="#111">COVID no Brasil</text>

    <!-- Excerpt (smaller, grey) -->
    <text x="16" y="373" font-family="Arial,sans-serif"
             font-size="17" fill="#444">Ministerio da Saude estaria escondendo dados. Milhares</text>
    <text x="16" y="395" font-family="Arial,sans-serif"
             font-size="17" fill="#444">mortos.</text>

    <!-- Accent bands -->
    <rect width="680" height="9" fill="#DC2626"/>
    <rect y="471" width="680" height="9" fill="#DC2626"/>
  </g>
</svg>