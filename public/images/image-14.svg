<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="480" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="bs" x="-4%" y="-4%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.12)"/>
    </filter>
    <clipPath id="fr"><rect width="680" height="480" rx="10"/></clipPath>
  </defs>
  <g clip-path="url(#fr)">
    <!-- WhatsApp wallpaper background -->
    <rect width="680" height="480" fill="#dfe7ed"/>
    <!-- Status bar -->
    <rect width="680" height="26" fill="#4A148C"/>
    <text x="14" y="18" font-family="Arial,sans-serif" font-size="12" fill="white" font-weight="bold">9:41</text>
    <text x="666" y="18" font-family="Arial,sans-serif" font-size="11" fill="white" text-anchor="end">&#9646;&#9646; &#9646;</text>
    <!-- Header bar -->
    <rect y="26" width="680" height="62" fill="#4A148C"/>
    <!-- Back arrow -->
    <text x="14" y="66" font-family="Arial,sans-serif" font-size="28" fill="white" font-weight="bold">&#8249;</text>
    <!-- Avatar -->
    <circle cx="60" cy="57" r="25" fill="#7B1FA2"/>
    <text x="60" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" fill="white" font-weight="bold">L</text>
    <!-- Contact name -->
    <text x="96" y="50" font-family="Arial,sans-serif" font-size="17" fill="white" font-weight="bold">Neto Lucas</text>
    <text x="96" y="72" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.75)">Online agora</text>
    <!-- Date separator -->
    <rect x="270" y="92" width="140" height="22" rx="11" fill="rgba(0,0,0,0.1)"/>
    <text x="340" y="107" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#555">Hoje</text>
    <!-- Message bubbles -->
    <rect x="18" y="112" width="281" height="52" rx="14" fill="white" filter="url(#bs)"/>
    <polygon points="18,126 4,136 18,144" fill="white"/>
    <text x="32" y="143" font-family="Arial,sans-serif" font-size="19" fill="#111">Feliz aniversario, vovo!!!</text>
    <text x="293" y="159" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#999">07:01</text>
    <rect x="18" y="176" width="319" height="52" rx="14" fill="white" filter="url(#bs)"/>
    <polygon points="18,190 4,200 18,208" fill="white"/>
    <text x="32" y="207" font-family="Arial,sans-serif" font-size="19" fill="#111">Que Deus te abencoe com saude!</text>
    <text x="331" y="223" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#999">07:01</text>
    <rect x="18" y="240" width="385.5" height="52" rx="14" fill="white" filter="url(#bs)"/>
    <polygon points="18,254 4,264 18,272" fill="white"/>
    <text x="32" y="271" font-family="Arial,sans-serif" font-size="19" fill="#111">Vamos la jantar com voce a noite, ta?</text>
    <text x="397.5" y="287" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#999">07:02</text>
    <rect x="18" y="304" width="328.5" height="52" rx="14" fill="white" filter="url(#bs)"/>
    <polygon points="18,318 4,328 18,336" fill="white"/>
    <text x="32" y="335" font-family="Arial,sans-serif" font-size="19" fill="#111">Te amo muito! Beijos da familia</text>
    <text x="340.5" y="351" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#999">07:02</text>
  </g>
</svg>