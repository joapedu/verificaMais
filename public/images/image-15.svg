    <text x="340" y="107" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#555">Hoje</text>
    <!-- Message bubbles -->
    <rect x="18" y="112" width="309.5" height="52" rx="14" fill="white" filter="url(#bs)"/>
    <polygon points="18,126 4,136 18,144" fill="white"/>
    <text x="32" y="143" font-family="Arial,sans-serif" font-size="19" fill="#111">Ola! Lembrete de mensalidade:</text>
    <text x="321.5" y="159" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#999">10:30</text>
    <rect x="18" y="176" width="357" height="52" rx="14" fill="white" filter="url(#bs)"/>
    <polygon points="18,190 4,200 18,208" fill="white"/>
    <text x="32" y="207" font-family="Arial,sans-serif" font-size="19" fill="#111">Vencimento: 05/07 - Valor: R$89,00</text>
    <text x="369" y="223" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#999">10:30</text>
    <rect x="18" y="240" width="300" height="52" rx="14" fill="white" filter="url(#bs)"/>
    <polygon points="18,254 4,264 18,272" fill="white"/>
    <text x="32" y="271" font-family="Arial,sans-serif" font-size="19" fill="#111">PIX: academia@vivrbem.com.br</text>
    <text x="312" y="287" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#999">10:31</text>
    <rect x="18" y="304" width="395" height="52" rx="14" fill="white" filter="url(#bs)"/>
    <polygon points="18,318 4,328 18,336" fill="white"/>
    <text x="32" y="335" font-family="Arial,sans-serif" font-size="19" fill="#111">Duvidas: (11) 3456-7890. Bons treinos!</text>
    <text x="407" y="351" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#999">10:31</text>
