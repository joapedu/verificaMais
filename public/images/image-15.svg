<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="480" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="bs" x="-4%" y="-4%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.12)"/>
    </filter>
    <clipPath id="fr"><rect width="680" height="480" rx="10"/></clipPath>
  </defs>
  <g clip-path="url(#fr)">
    <!-- WhatsApp wallpaper background -->
    <rect width="680" height="480" fill="#dfe7ed"/>
    <!-- Status bar -->
    <rect width="680" height="26" fill="#E65100"/>
