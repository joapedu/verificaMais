<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="480" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="bs" x="-4%" y="-4%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.12)"/>
    </filter>
    <clipPath id="fr"><rect width="680" height="480" rx="10"/></clipPath>
  </defs>
  <g clip-path="url(#fr)">
    <!-- WhatsApp wallpaper background -->
    <rect width="680" height="480" fill="#dfe7ed"/>
    <!-- Status bar -->
    <rect width="680" height="26" fill="#E65100"/>
    <text x="14" y="18" font-family="Arial,sans-serif" font-size="12" fill="white" font-weight="bold">9:41</text>
    <text x="666" y="18" font-family="Arial,sans-serif" font-size="11" fill="white" text-anchor="end">&#9646;&#9646; &#9646;</text>
    <!-- Header bar -->
    <rect y="26" width="680" height="62" fill="#E65100"/>
    <!-- Back arrow -->
    <text x="14" y="66" font-family="Arial,sans-serif" font-size="28" fill="white" font-weight="bold">&#8249;</text>
    <!-- Avatar -->
    <circle cx="60" cy="57" r="25" fill="#FF6D00"/>
    <text x="60" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" fill="white" font-weight="bold">@</text>
    <!-- Contact name -->
    <text x="96" y="50" font-family="Arial,sans-serif" font-size="17" fill="white" font-weight="bold">Amazon Prime Suporte</text>
    <text x="96" y="72" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.75)">Online agora</text>
    <!-- Date separator -->
    <rect x="270" y="92" width="140" height="22" rx="11" fill="rgba(0,0,0,0.1)"/>
    <text x="340" y="107" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#555">Hoje</text>
    <!-- Message bubbles -->
    <rect x="18" y="112" width="328.5" height="80" rx="14" fill="white" filter="url(#bs)"/>
    <polygon points="18,126 4,136 18,144" fill="white"/>
    <text x="32" y="143" font-family="Arial,sans-serif" font-size="19" fill="#111">Sua assinatura Amazon Prime foi</text>
    <text x="32" y="171" font-family="Arial,sans-serif" font-size="19" fill="#111">renovada.</text>
    <text x="340.5" y="187" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#999">07:30</text>
    <rect x="18" y="204" width="366.5" height="52" rx="14" fill="white" filter="url(#bs)"/>
    <polygon points="18,218 4,228 18,236" fill="white"/>
    <text x="32" y="235" font-family="Arial,sans-serif" font-size="19" fill="#111">Cobranca de R$39,90 realizada hoje.</text>
    <text x="378.5" y="251" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#999">07:30</text>
    <rect x="18" y="268" width="366.5" height="52" rx="14" fill="white" filter="url(#bs)"/>
    <polygon points="18,282 4,292 18,300" fill="white"/>
    <text x="32" y="299" font-family="Arial,sans-serif" font-size="19" fill="#111">Para CANCELAR acesse: amazon-br.com</text>
    <text x="378.5" y="315" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#999">07:31</text>
    <rect x="18" y="332" width="347.5" height="80" rx="14" fill="white" filter="url(#bs)"/>
    <polygon points="18,346 4,356 18,364" fill="white"/>
    <text x="32" y="363" font-family="Arial,sans-serif" font-size="19" fill="#111">/cancelar-prime - informe login e</text>
    <text x="32" y="391" font-family="Arial,sans-serif" font-size="19" fill="#111">senha.</text>
    <text x="359.5" y="407" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#999">07:31</text>
  </g>
