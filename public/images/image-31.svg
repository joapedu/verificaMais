<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="480" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#002244"/><stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <clipPath id="fr"><rect width="680" height="480"/></clipPath>
  </defs>
  <g clip-path="url(#fr)">
    <!-- ── TOP ILLUSTRATION ZONE (y 0–200) ── -->
    <rect width="680" height="200" fill="url(#bg)"/>
    <rect width="680" height="200" fill="rgba(0,0,0,0.18)"/>
    <!-- Big icon centred vertically in top zone -->
    <text x="340" y="138" text-anchor="middle" font-family="Arial,sans-serif"
          font-size="104" fill="rgba(255,255,255,0.88)">&#128203;</text>

    <!-- ── BOTTOM TEXT ZONE (y 200–480, white) ── -->
    <rect y="200" width="680" height="280" fill="white"/>

    <!-- Source band -->
    <rect y="200" width="680" height="34" fill="#0D47A1"/>
    <text x="16" y="223" font-family="Arial,sans-serif" font-size="16"
          font-weight="bold" fill="white">gov.br / Previdencia Social</text>
    <text x="664" y="223" text-anchor="end" font-family="Arial,sans-serif"
          font-size="13" fill="rgba(255,255,255,0.82)">01/05/2025</text>

    <!-- Badge -->
    <rect x="16" y="248" width="76" height="24" rx="12" fill="#1565C0"/>
    <text x="26" y="264" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">OFICIAL</text>

    <!-- Headline (large, dark) -->
    <text x="16" y="295" font-family="Arial,sans-serif"
             font-size="30" font-weight="900" fill="#111">INSS reajusta beneficios em</text>
    <text x="16" y="329" font-family="Arial,sans-serif"
             font-size="30" font-weight="900" fill="#111">4,1% a partir de maio</text>

    <!-- Excerpt (smaller, grey) -->
    <text x="16" y="373" font-family="Arial,sans-serif"
             font-size="17" fill="#444">Beneficio minimo sobe de R$1.412 para R$1.470 pelo INPC.</text>

    <!-- Accent bands -->
    <rect width="680" height="9" fill="#1565C0"/>
    
  </g>
</svg>